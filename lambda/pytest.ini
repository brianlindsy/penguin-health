[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short --cov=. --cov-report=html --cov-report=term-missing -m "not playwright"
filterwarnings =
    ignore::DeprecationWarning
markers =
    unit: Unit tests (fast, no AWS calls)
    playwright: Browser-driven tests that require Playwright + a real
        Chromium install. Skipped by default; run via `pytest -m playwright`
        after `pip install playwright aiohttp && playwright install chromium`.
