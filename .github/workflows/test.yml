name: Tests

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # Allows manual trigger from GitHub Actions UI

jobs:
  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: lambda/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests
        run: pytest tests/unit -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lambda/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend-tests:
    name: Frontend UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Run coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: admin-ui/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install ruff
        run: pip install ruff

      - name: Run Python lint
        run: ruff check lambda/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: admin-ui
        run: npm ci

      - name: Run frontend lint
        working-directory: admin-ui
        run: npm run lint
